name: Publish
on: 
  workflow_dispatch: 
  push:
    branches:
    - master

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'  # Changed from 10.0.x (not released yet)

    - name: Restore
      run: dotnet restore ./SkillMDFileDemo.slnx

    - name: Build
      run: dotnet build ./SkillMDFileDemo.slnx --configuration Release --no-restore

    - name: Publish
      run: dotnet publish ./SkillMDFileDemo.slnx --configuration Release --no-build
